name: Build Docker Image

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: cursor-api:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker image
        run: |
          docker save cursor-api:latest | gzip > cursor-api.tar.gz
          ls -lh cursor-api.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: cursor-api-docker-image
          path: cursor-api.tar.gz
          retention-days: 30
